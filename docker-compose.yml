# Career-Ops local stack — VEEPEE / vpontual personalization.
#
# Services:
#   scanner  — one-shot, invoked by cron (P2) or manually.
#   ui       — TODO P1: Next.js reader UI at :3340.
#   pdf      — TODO P1: Playwright + Chromium for generate-pdf.mjs (on-demand).
#
# Resource caps sized so the homepage renders within HAProxy's timeout — ui
# was at cpus:0.5 / mem:256m and caused 504s on the public UI hostname (2026-05-12).

services:

  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    image: career-ops-scanner:local
    # Run as host uid/gid so files written from the container land owned by vp,
    # matching the repo owner. Avoids root-owned data/ and reports/ on the host.
    user: "1000:1000"
    # Bind-mount the whole project so edits to cv.md / portals.yml / modes are live
    # without rebuilding the image.
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    cpus: 1.0
    mem_limit: 1g
    # One-shot by default — `docker compose run --rm scanner` to invoke.
    # Never keep running.
    restart: "no"
    command: node scan.mjs

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: career-ops-ui:local
    ports:
      - "3340:3000"
    # Mount repo root as /data. UI reads scanner output and writes to data/applications.md
    # via /api/status; runs as host uid 1000 so writes land owned by vp.
    user: "1000:1000"
    # Mount repo root as /data so the UI can read data/pipeline.md, reports/,
    # applications.md, etc.
    volumes:
      - .:/data
    environment:
      - CAREER_OPS_ROOT=/data
      - NODE_ENV=production
    cpus: 2.0
    mem_limit: 1g
    restart: unless-stopped

  applier:
    build:
      context: .
      dockerfile: Dockerfile.applier
    image: career-ops-applier:local
    user: "1000:1000"
    volumes:
      - .:/app
    working_dir: /app
    env_file:
      - .env
    cpus: 1.0
    mem_limit: 2g
    restart: "no"
    # Override per command: `docker compose run --rm applier node stage-applications.mjs`
