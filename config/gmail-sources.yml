# Gmail lead-source sender list — VEEPEE / vpontual personalization.
#
# Curated empirically from 18 months of mail in the `Jobs` Gmail label
# (4,863 messages, 115 unique senders). Edit this file to grow or trim
# the source list — the poller (fetch-gmail-leads.mjs) reads it on every run.
#
# `from_substring` matches anywhere in the From header (case-insensitive).
# Pattern matching, not exact-match, so `lensa.com` catches every Lensa alias.

leads:
  # Aggregators / job boards
  - lensa.com
  - ziprecruiter.com
  - welcometothejungle.com
  - idealist.org
  - mail.idealist.org
  - alerts.jobot.com
  - neuvoo.com
  - glassdoor.com
  - sites.careerbuilder.com
  - jobalerts-noreply@linkedin.com
  - jobs-listings@linkedin.com
  - jobs-noreply@linkedin.com
  - donotreply@match.indeed.com
  - ripplematch.net
  - ripplematch.com
  - getripplematch.com
  - support@builtin.com
  - jobs2web.com
  # Recruiter aliases (may add more as the user encounters them)
  - mike@mccarthysearch.com
  - kimble@kimblegroup.com
  - jennie@jenniejohnson.com
  - kandiksh@amazon.jobs
  - summaiti@amazon.jobs
  - sanbala@amazon.com
  # Government job portals
  - oasys@dcas.nyc.gov
  - notification@cityjobsupport.nyc.gov
  # Direct-from-company subscribers
  - "@waymo.com"

