# URL patterns to reject before any redirect resolution. Saves the
# expensive HTTP roundtrip on logos, unsubscribe, profile pages, etc.
url_noise_patterns:
  - cdn.lensa.com
  - lensa.com/profile-settings
  - lensa.com/unsubscribe
  - lensa.com/talent/job-opportunities
  - /unsubscribe
  - /privacy
  - /terms
  - /static/
  - /assets/
  - /img/
  - /image/
  - /images/
  - /cdn/
  - /favicon
  - email.linkedin.com/manage
  - linkedin.com/legal
  - linkedin.com/help
  - linkedin.com/feed
  - email.welcometothejungle.com/c/eJ
  - email.idealist.org/c/
  - mailtrack.io
  - cmail
  - utm_emailprefs

# How many days back to scan on first run (no cursor yet). Subsequent runs
# only look at messages newer than the saved cursor.
first_run_lookback_days: 14

# Cap concurrent HEAD requests when resolving aggregator-wrapped URLs.
redirect_concurrency: 5
redirect_timeout_ms: 8000
